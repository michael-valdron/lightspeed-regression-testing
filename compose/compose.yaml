services:
  lightspeed-core:
    image: ${LIGHTSPEED_CORE_IMAGE}
    ports:
      - "8080:8080"
    volumes:
      - ./lightspeed-core-configs/lightspeed-stack.yaml:/app-root/lightspeed-stack.yaml:Z
      - ./lightspeed-core-configs/rhdh-profile.py:/app-root/rhdh-profile.py:Z
      - ./llama-stack-configs/config.yaml:/app-root/config.yaml:Z
      - ./rag-content:/rag-content:Z
      - ./feedback-data:/tmp/data/feedback:Z
    env_file:
      - ./env/values.env
    environment:
      ENABLE_SAFETY: "true"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8080/readiness",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
  test-mcp-server:
    image: quay.io/redhat-ai-dev/test-mcp-server:latest
    ports:
      - "8888:8888"
  ollama:
      image: ${OLLAMA_IMAGE}
      env_file:
        - ./env/values.env
      entrypoint:
        - /bin/sh
        - -c
      command:
        - |
          set -e
          MODEL="${SAFETY_MODEL:-llama-guard3:8b}"
          ollama serve &
          OLLAMA_PID=$$!
          until ollama list >/dev/null 2>&1; do
            sleep 1
          done
          ollama pull "$${MODEL}"
          wait "$${OLLAMA_PID}"
      ports:
        - "11434:11434"
      volumes:
        - ollama-data:/root/.ollama
      healthcheck:
        test: ["CMD-SHELL", "MODEL=\"$${SAFETY_MODEL:-llama-guard3:8b}\"; ollama list | grep -q \"$${MODEL}\""]
        interval: 5s
        timeout: 3s
        retries: 20
        start_period: 15s

volumes:
  ollama-data: